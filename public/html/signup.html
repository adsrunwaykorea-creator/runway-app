<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입 - 런웨이</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Bebas+Neue&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/html/style.css">
    <style>
        body.page-signup {
            background: linear-gradient(180deg, #f8fafc 0%, #eef2f7 100%);
            min-height: 100vh;
        }
        .signup-shell {
            min-height: calc(100vh - 72px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1.25rem 3rem;
        }
        .signup-card {
            width: 100%;
            max-width: 620px;
            background: #ffffff;
            border: 1px solid #e5e7eb;
            border-radius: 16px;
            box-shadow: 0 18px 45px rgba(15, 23, 42, 0.08);
            padding: 2rem;
        }
        .signup-title {
            font-size: 1.8rem;
            font-weight: 800;
            color: #0f172a;
            margin-bottom: 0.5rem;
        }
        .signup-desc {
            color: #475569;
            font-size: 0.95rem;
            line-height: 1.65;
            margin-bottom: 1.25rem;
        }
        .social-signup {
            margin: 1rem 0 1.1rem;
        }
        .social-signup-buttons {
            display: grid;
            gap: 0.6rem;
        }
        .social-signup-btn {
            width: 100%;
            height: 44px;
            border-radius: 10px;
            font-size: 0.92rem;
            font-weight: 700;
            border: 1px solid transparent;
            cursor: pointer;
        }
        .social-signup-btn.kakao {
            background: #fee500;
            color: #181600;
            border-color: #f1d900;
        }
        .social-signup-btn.google {
            background: #ffffff;
            color: #111827;
            border-color: #d1d5db;
        }
        .social-signup-btn.naver {
            background: #03c75a;
            color: #ffffff;
            border-color: #03b152;
        }
        .signup-divider {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin: 1.2rem 0 1.2rem;
            color: #6b7280;
            font-size: 0.86rem;
            font-weight: 600;
        }
        .signup-divider::before,
        .signup-divider::after {
            content: "";
            flex: 1;
            height: 1px;
            background: #e5e7eb;
        }
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.85rem;
        }
        .login-form-group {
            margin-bottom: 0.9rem;
        }
        .login-form-group label {
            display: block;
            font-weight: 600;
            font-size: 0.88rem;
            color: #1f2937;
            margin-bottom: 0.45rem;
        }
        .login-input {
            width: 100%;
            height: 44px;
            border: 1px solid #d1d5db;
            border-radius: 10px;
            background: #fafafa;
            padding: 0 0.9rem;
            font-size: 0.92rem;
            transition: border-color 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
        }
        .login-input:focus {
            outline: none;
            border-color: #374151;
            box-shadow: 0 0 0 4px rgba(17, 24, 39, 0.08);
            background: #ffffff;
        }
        .auth-feedback {
            display: none;
            border-radius: 10px;
            padding: 0.65rem 0.75rem;
            font-size: 0.86rem;
            line-height: 1.5;
            margin: 0.9rem 0;
        }
        .auth-feedback.error {
            display: block;
            background: #fef2f2;
            border: 1px solid #fecaca;
            color: #991b1b;
        }
        .auth-feedback.success {
            display: block;
            background: #ecfdf5;
            border: 1px solid #a7f3d0;
            color: #065f46;
        }
        .login-submit {
            width: 100%;
            height: 44px;
            border: none;
            border-radius: 10px;
            background: #111827;
            color: #ffffff;
            font-size: 0.93rem;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s ease;
            margin-top: 0.35rem;
        }
        .login-submit:hover {
            background: #1f2937;
        }
        .login-submit:disabled {
            background: #9ca3af;
            cursor: not-allowed;
        }
        .login-links {
            margin-top: 1rem;
            font-size: 0.86rem;
        }
        .login-links a {
            color: #4b5563;
            text-decoration: none;
        }
        .login-links a:hover {
            text-decoration: underline;
            color: #111827;
        }
        @media (max-width: 768px) {
            .form-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body class="page-signup">
    <nav id="nav">
        <div class="nav-container">
            <a href="/" class="logo">RUNWAY</a>
            <div class="nav-right">
                <ul class="nav-links">
                    <li><a href="/">MAIN</a></li>
                    <li><a href="/sns">SNS 마케팅</a></li>
                    <li><a href="/db">DB 마케팅</a></li>
                </ul>
                <a href="/login" class="btn nav-login-btn">회원가입/로그인</a>
                <a href="#none" class="btn btn-primary nav-cta">상담 준비 중</a>
            </div>
        </div>
    </nav>

    <main class="signup-shell">
        <section class="signup-card" aria-label="런웨이 회원가입">
            <h1 class="signup-title">회원가입</h1>
            <div class="social-signup" aria-label="간편회원가입">
                <div class="social-signup-buttons">
                    <button id="kakaoSignupButton" type="button" class="social-signup-btn kakao">카카오로 시작하기</button>
                    <button id="googleSignupButton" type="button" class="social-signup-btn google">구글로 시작하기</button>
                    <button id="naverSignupButton" type="button" class="social-signup-btn naver">네이버로 시작하기</button>
                </div>
            </div>
            <div class="signup-divider" role="presentation">또는 이메일로 가입하기</div>
            <p class="signup-desc">
                계약/결제 직전 가입을 기준으로, 가입 시 profiles에 customer로 저장되고 필요 시 lead_id로 상담 리드와 연결됩니다.
            </p>

            <form id="signupForm" novalidate>
                <div class="form-grid">
                    <div class="login-form-group">
                        <label for="name">이름</label>
                        <input id="name" class="login-input" type="text" required>
                    </div>
                    <div class="login-form-group">
                        <label for="companyName">회사명</label>
                        <input id="companyName" class="login-input" type="text" required>
                    </div>
                </div>

                <div class="login-form-group">
                    <label for="phone">연락처(선택)</label>
                    <input id="phone" class="login-input" type="text" placeholder="010-0000-0000">
                </div>

                <div class="login-form-group">
                    <label for="email">이메일</label>
                    <input id="email" class="login-input" type="email" autocomplete="email" required>
                </div>

                <div class="form-grid">
                    <div class="login-form-group">
                        <label for="password">비밀번호</label>
                        <input id="password" class="login-input" type="password" autocomplete="new-password" required>
                    </div>
                    <div class="login-form-group">
                        <label for="confirmPassword">비밀번호 확인</label>
                        <input id="confirmPassword" class="login-input" type="password" autocomplete="new-password" required>
                    </div>
                </div>

                <div id="errorMessage" class="auth-feedback" role="alert" aria-live="polite"></div>
                <div id="successMessage" class="auth-feedback" role="status" aria-live="polite"></div>

                <button id="submitButton" class="login-submit" type="submit">회원가입</button>
            </form>

            <div class="login-links">
                <a href="/login">이미 계정이 있으신가요? 로그인</a>
            </div>
        </section>
    </main>

    <script type="module" src="js/signup-page.js"></script>
</body>
</html>
